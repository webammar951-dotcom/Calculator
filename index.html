<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="container mtt-5">
        <div class="row">
            <div class="col-md-4"></div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <form action=""name="calc">
                        <input type="text" name="display" id="input"class="form-control control text-right" readonly>
                        <div class="d-flex justify-content-end align-items-end">
                            <button type="reset" class="btn btn-danger border-none mt-3">Clear</button>
                        </div>
                        <br>
                        <input type="button"class="btn btn-warning  btn-xl  btn-lg mt-2"value="9"  onclick="calc.display.value +='9'">
                        <input type="button" class="btn btn-danger  btn-xl btn-lg  mt-2"value="8"onclick="calc.display.value +='8'">
                        <input type="button" class="btn btn-info  btn-xl  btn-lg mt-2"value="7"onclick="calc.display.value +='7'">
                        <input type="button" class="btn btn-dark  btn-xl btn-lg mt-2"value="+"onclick="calc.display.value +='+'">

                        <br>
                        <input type="button" class="btn btn-warning btn-xl btn-lg mt-2"value="6"onclick="calc.display.value +='6'">
                        <input type="button" class="btn btn-danger btn-xl btn-lg  mt-2"value="5"onclick="calc.display.value +='5'">
                        <input type="button" class="btn btn-info btn-xl btn-lg mt-2"value="4"onclick="calc.display.value +='4'">
                        <input type="button"class="btn btn-dark btn-xl btn-xl btn-lg mt-2"value="-"onclick="calc.display.value +='-'">
                        <br>
                        <input type="button" class="btn btn-warning btn-xl btn-lg mt-2"value="3"onclick="calc.display.value +='3'">
                        <input type="button" class="btn btn-danger btn-xl btn-lg  mt-2"value="2"onclick="calc.display.value +='2'">
                        <input type="button" class="btn btn-info btn-xl btn-lg mt-2"value="1"onclick="calc.display.value +='1'">
                        <input type="button" class="btn btn-dark btn-xl btn-xl btn-lg mt-2"value="*"onclick="calc.display.value +='*'">
                        <br>
                        <input type="button" class="btn btn-warning btn-xl btn-lg mt-2"value="0"onclick="calc.display.value +='0'">
                        <input type="button" class="btn btn-danger btn-xl btn-lg  mt-2"value="."onclick="calc.display.value +='.'">
                        <input type="button" class="btn btn-info btn-xl btn-lg mt-2"value="="onclick="reduce()
                         function reduce() {
            const result = eval(calc.display.value)
            calc.display.value = result
        }">
                        <input type="button" class="btn btn-dark btn-xl btn-xl btn-lg mt-2"value="/"onclick="calc.display.value +='/'">
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-4"></div>
        </div>
    </div>
</body>
</html>
